<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>Admin Control</title>
    <style>
        body { padding: 20px; font-family: sans-serif; background: #eee; }
        .card { background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input, textarea { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { background: #1a237e; color: white; border: none; padding: 12px; width: 100%; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <h2 style="color:#1a237e;">EarnHub এডমিন প্যানেল</h2>
    
    <div class="card">
        <h3>🏆 সেরা রেফারার সেট করুন</h3>
        <input type="text" id="bName" placeholder="মেম্বারের নাম">
        <input type="text" id="bImg" placeholder="ছবির লিঙ্ক (URL)">
        <textarea id="bAbout" placeholder="মেম্বার সম্পর্কে বিস্তারিত"></textarea>
        <button onclick="saveBest()">পাবলিশ করুন</button>
    </div>

    <div class="card">
        <h3>➕ টাস্ক আপডেট (১ থেকে ১০০...)</h3>
        <input type="number" id="tId" placeholder="টাস্ক আইডি">
        <input type="text" id="tV1" placeholder="রেজিস্ট্রেশন ভিডিও লিঙ্ক">
        <input type="text" id="tV2" placeholder="কাজ করার ভিডিও লিঙ্ক">
        <input type="text" id="tWallet" placeholder="ওয়ালেট নম্বর">
        <button onclick="saveTask()">সেভ করুন</button>
    </div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="script.js"></script>
<script>
    function saveBest() {
        const name = document.getElementById('bName').value;
        const img = document.getElementById('bImg').value;
        const about = document.getElementById('bAbout').value;
        db.ref('settings/topReferrer').set({ name, img, about }).then(() => alert("আপডেট হয়েছে!"));
    }

    function saveTask() {
        const id = document.getElementById('tId').value;
        db.ref('tasks/' + id).set({
            v1: document.getElementById('tV1').value,
            v2: document.getElementById('tV2').value,
            wallet: document.getElementById('tWallet').value
        }).then(() => alert("টাস্ক সেভ হয়েছে!"));
    }
</script>
</body>
</html>
