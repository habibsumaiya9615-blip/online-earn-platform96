<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EarnHub Admin Panel</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        .admin-card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
        h2 { color: #1a237e; text-align: center; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        .save-btn { background: #28a745; color: white; border: none; padding: 12px; width: 100%; border-radius: 5px; cursor: pointer; font-size: 16px; font-weight: bold; }
        .back-btn { background: #6c757d; color: white; border: none; padding: 10px; width: 100%; border-radius: 5px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

<div class="admin-card">
    <h2>এডমিন প্যানেল</h2>
    <p style="text-align: center; color: #666;">সেরা রেফারার সেট করুন</p>
    
    <div class="input-group">
        <label>নাম:</label>
        <input type="text" id="adminTopName" placeholder="উইনর নাম লিখুন">
    </div>
    
    <div class="input-group">
        <label>ছবি লিঙ্ক (URL):</label>
        <input type="text" id="adminTopImg" placeholder="ছবির ডাইরেক্ট লিঙ্ক দিন">
    </div>
    
    <div class="input-group">
        <label>ছোট বিবরণ:</label>
        <textarea id="adminTopAbout" rows="3" placeholder="তার সম্পর্কে কিছু লিখুন"></textarea>
    </div>
    
    <button class="save-btn" onclick="updateTopReferrer()">আপডেট করুন</button>
    <button class="back-btn" onclick="location.href='dashboard.html'">ড্যাশবোর্ড এ যান</button>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="script.js"></script>
<script>
    function updateTopReferrer() {
        const name = document.getElementById('adminTopName').value;
        const img = document.getElementById('adminTopImg').value;
        const about = document.getElementById('adminTopAbout').value;

        if(name && img && about) {
            db.ref('settings/topReferrer').set({
                name: name,
                img: img,
                about: about
            }).then(() => {
                alert('সফলভাবে আপডেট হয়েছে!');
            });
        } else {
            alert('সবগুলো ঘর পূরণ করুন!');
        }
    }
</script>
</body>
</html>
