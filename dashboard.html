<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EarnHub Dashboard</title>
    <style>
        body { font-family: sans-serif; margin: 0; background: #eef2f3; text-align: center; }
        .header { background: #1a237e; color: white; padding: 15px; font-weight: bold; }
        .card { background: white; padding: 20px; margin: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    </style>
</head>
<body onload="loadUser()">
    <div class="header">EarnHub Platform Dashboard</div>
    <div class="card">
        <h3>স্বাগতম, <span id="uName" style="color:#1a237e;">...</span>!</h3>
        <p>আপনার ব্যালেন্স: <b style="color:#28a745;">৳ <span id="uBalance">0.00</span></b></p>
    </div>
    <div class="card">
        <button onclick="localStorage.clear(); location.href='index.html';">লগ আউট</button>
    </div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="script.js"></script>
<script>
    function loadUser() {
        const user = localStorage.getItem('currentUser');
        if(!user) { location.href = 'index.html'; return; }
        
        db.ref('users/' + user).on('value', (snap) => {
            const data = snap.val();
            if(data) {
                document.getElementById('uName').innerText = data.full_name;
                document.getElementById('uBalance').innerText = data.balance.toFixed(2);
            }
        });
    }
</script>
</body>
</html>
