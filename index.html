<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HS Earn Platform</title>

<!-- Firebase v8 SDK -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<style>
body{background:#0f172a;color:#fff;font-family:sans-serif}
.box{max-width:400px;margin:auto;padding:15px;background:#1e293b;margin-top:20px;border-radius:10px}
input,button{width:100%;padding:10px;margin:5px 0;border-radius:8px;border:none}
button{background:#22c55e;color:#fff}
.card{background:#334155;padding:10px;margin:5px 0;border-radius:8px}
.hidden{display:none}
</style>
</head>
<body>

<!-- AUTH -->
<div class="box" id="auth">
<h3>Register</h3>
<input id="name" placeholder="Name">
<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Password">
<input id="ref" placeholder="Referral UID (Optional)">
<button onclick="register()">Register</button>

<h3>Login</h3>
<input id="lEmail" placeholder="Email">
<input id="lPass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div class="box hidden" id="dash">
<h3 id="welcome"></h3>
<p>Balance: ৳ <span id="bal">0</span></p>
<button onclick="openTasks()">Tasks</button>
<button onclick="openWithdraw()">Withdraw</button>
<button onclick="openAdmin()">Admin</button>
<button onclick="logout()">Logout</button>
</div>

<!-- TASKS -->
<div class="box hidden" id="taskBox">
<h3>Tasks</h3>
<div id="taskList"></div>
<button onclick="back()">Back</button>
</div>

<!-- WITHDRAW -->
<div class="box hidden" id="withBox">
<h3>Withdraw</h3>
<input id="m" placeholder="bKash/Nagad">
<input id="n" placeholder="Number">
<input id="a" placeholder="Amount">
<button onclick="req()">Request</button>
<button onclick="back()">Back</button>
</div>

<!-- ADMIN PANEL -->
<div class="box hidden" id="admin">
<h3>Admin Panel</h3>

<input id="t" placeholder="Task Title">
<input id="l" placeholder="Video Link">
<input id="r" placeholder="Reward">
<button onclick="addTask()">Add Task</button>

<h4>Withdraw Requests</h4>
<div id="wList"></div>
<button onclick="back()">Back</button>
</div>

<script>
// Firebase config
var config = {
  apiKey: "AIzaSyDbCLBrCfRYX-fRNQzHrLvOJaDQKG0tvys",
  authDomain: "hs-online-earn-platform.firebaseapp.com",
  projectId: "hs-online-earn-platform"
};
firebase.initializeApp(config);

var auth = firebase.auth();
var db = firebase.firestore();
var uid;

// REGISTER
function register(){
  auth.createUserWithEmailAndPassword(email.value, pass.value)
  .then(userCredential => {
    uid = userCredential.user.uid;

    let referrerId = ref.value; // Referral UID
    let bonus = 10; // Referral bonus

    db.collection("users").doc(uid).set({
      name: name.value,
      balance: 0,
      refs: 0,
      email: email.value,
      admin: false
    });

    if(referrerId){
      let refUser = db.collection("users").doc(referrerId);
      refUser.get().then(doc => {
        if(doc.exists){
          refUser.update({
            balance: firebase.firestore.FieldValue.increment(bonus),
            refs: firebase.firestore.FieldValue.increment(1)
          });
        }
      });
    }

    alert("Registered Successfully!");
  })
  .catch(err => alert(err.message));
}

// LOGIN
function login(){
  auth.signInWithEmailAndPassword(lEmail.value, lPass.value)
  .then(r => {
    uid = r.user.uid;
    load();
  })
  .catch(err => alert(err.message));
}

// LOAD DASHBOARD
function load(){
  db.collection("users").doc(uid).get().then(d=>{
    document.getElementById("auth").classList.add("hidden");
    document.getElementById("dash").classList.remove("hidden");

    document.getElementById("welcome").innerText = "Welcome "+d.data().name;
    document.getElementById("bal").innerText = d.data().balance;

    if(d.data().email === "habiburrahman962540@gmail.com" && d.data().admin === true){
      document.querySelector("button[onclick='openAdmin()']").style.display = "block";
    }else{
      document.querySelector("button[onclick='openAdmin()']").style.display = "none";
    }

    loadTasks();
    loadWithdraw();
  });
}

// LOAD TASKS
function loadTasks(){
  document.getElementById("taskList").innerHTML = "";
  db.collection("tasks").get().then(s=>{
    s.forEach(d=>{
      let t = d.data();
      document.getElementById("taskList").innerHTML += `
        <div class="card">
          ${t.title}<br>
          <a href="${t.link}" target="_blank">Watch</a>
          <button onclick="done('${d.id}',${t.reward})">Done</button>
        </div>`;
    });
  });
}

// COMPLETE TASK
function done(id,rw){
  let ref = db.collection("users").doc(uid).collection("done").doc(id);
  ref.get().then(d=>{
    if(d.exists){ alert("Already done"); }
    else{
      ref.set({ok:true});
      db.collection("users").doc(uid).update({
        balance: firebase.firestore.FieldValue.increment(rw)
      });
      alert("Earned "+rw);
      load();
    }
  });
}

// WITHDRAW REQUEST
function req(){
  if(a.value<50){ alert("Minimum withdraw 50"); return; }
  db.collection("withdraw").add({
    uid: uid,
    method: m.value,
    number: n.value,
    amount: Number(a.value),
    status: "pending"
  });
  alert("Request Sent");
}

// LOAD WITHDRAW REQUESTS (ADMIN)
function loadWithdraw(){
  document.getElementById("wList").innerHTML="";
  db.collection("withdraw").get().then(s=>{
    s.forEach(d=>{
      let w = d.data();
      document.getElementById("wList").innerHTML += `
        <div class="card">
          ${w.number} ৳${w.amount}
          <button onclick="ok('${d.id}','${w.uid}',${w.amount})">✔</button>
          <button onclick="no('${d.id}')">✖</button>
        </div>`;
    });
  });
}

// APPROVE / REJECT WITHDRAW (ADMIN)
function ok(id,u,a){
  db.collection("withdraw").doc(id).update({status:"approved"});
  db.collection("users").doc(u).update({
    balance: firebase.firestore.FieldValue.increment(-a)
  });
  loadWithdraw();
}
function no(id){
  db.collection("withdraw").doc(id).update({status:"rejected"});
  loadWithdraw();
}

// ADD TASK (ADMIN)
function addTask(){
  db.collection("tasks").add({
    title: t.value,
    link: l.value,
    reward: Number(r.value)
  });
  alert("Task Added");
}

// NAVIGATION
function openTasks(){dash.classList.add("hidden");taskBox.classList.remove("hidden");}
function openWithdraw(){dash.classList.add("hidden");withBox.classList.remove("hidden");}
function openAdmin(){dash.classList.add("hidden");admin.classList.remove("hidden");}
function back(){taskBox.classList.add("hidden");withBox.classList.add("hidden");admin.classList.add("hidden");dash.classList.remove("hidden");}
function logout(){auth.signOut(); location.reload();}
</script>
</body>
</html>
