<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EarnHub - Login</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #f4f7f6; padding-top: 50px; }
        .login-box { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 85%; max-width: 350px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        .btn { background: #1a237e; color: white; border: none; padding: 12px; width: 100%; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
<div class="login-box">
    <h2 style="color:#1a237e;">EarnHub লগইন</h2>
    <input type="text" id="username" placeholder="ইউজারনেম">
    <input type="password" id="password" placeholder="পাসওয়ার্ড">
    <button class="btn" onclick="login()">লগইন করুন</button>
    <p style="margin-top:15px;">অ্যাকাউন্ট নেই? <a href="signup.html">এখানে নতুন খুলুন</a></p>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="script.js"></script>
<script>
    function login() {
        const user = document.getElementById('username').value.toLowerCase().trim();
        const pass = document.getElementById('password').value;
        if(!user || !pass) { alert("ইউজারনেম ও পাসওয়ার্ড দিন"); return; }
        
        db.ref('users/' + user).once('value', (snap) => {
            const data = snap.val();
            if(data && data.password === pass) {
                localStorage.setItem('currentUser', user);
                location.href = 'dashboard.html';
            } else { alert("ভুল তথ্য! আগে নতুন অ্যাকাউন্ট খুলুন।"); }
        });
    }
</script>
</body>
</html>
